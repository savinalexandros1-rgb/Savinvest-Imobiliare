<style>
  :root{
    --green-deep:#1a3a2a;--green-mid:#2d6a4f;--green-bright:#40916c;
    --green-light:#74c69d;--green-pale:#b7e4c7;--green-mist:#d8f3dc;
    --white:#fafff8;--off-white:#f1f9f3;--text-dark:#0d2318;--gold:#c9a84c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  a{color:inherit;text-decoration:none;}
  html{scroll-behavior:smooth;}
  body{font-family:'Jost',sans-serif;background:var(--white);color:var(--text-dark);}

  /* NAV */
  nav{
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 48px;
    background:rgba(250,255,248,0.97);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--green-pale);
  }
  .nav-logo{display:flex;align-items:center;line-height:0;}
  .nav-logo-img{width:124px;height:auto;display:block;}
  .nav-logo-text{display:flex;flex-direction:column;}
  .nav-logo-text span:first-child{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--green-deep);}
  .nav-logo-text span:last-child{font-size:9px;font-weight:500;letter-spacing:4px;color:var(--green-bright);text-transform:uppercase;}
  .btn-back{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:38px;
    padding:0;
    font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;
    color:var(--green-mid);
    border:none;background:transparent;
    transition:color 0.2s;
    white-space:nowrap;
  }
  .btn-back:hover{color:var(--green-deep);}

  /* CONTAINER */
  .container{max-width:1200px;margin:0 auto;padding:0 48px;}

  /* HEADER PROP */
  .prop-header{padding:32px 0 20px;}
  .prop-badge{display:inline-block;background:var(--gold);color:var(--text-dark);padding:4px 14px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
  .prop-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--green-deep);line-height:1.2;margin-bottom:10px;}
  .prop-meta{display:flex;align-items:center;gap:20px;font-size:14px;color:#5a7a65;}
  .prop-meta span{display:flex;align-items:center;gap:6px;}
  .prop-meta-feats{display:flex;align-items:center;gap:24px;margin-top:12px;padding-top:12px;border-top:1px solid var(--green-mist);flex-wrap:wrap;}
  .prop-meta-feat{font-size:15px;font-weight:600;color:var(--green-deep);}
  .prop-meta-feat span{font-size:13px;color:#7a9a82;font-weight:400;margin-left:4px;}

  /* PHOTO GRID - Airbnb style */
  .photo-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:300px 300px;
    gap:8px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    margin-bottom:40px;
  }
  .photo-grid-main{
    grid-row:span 2;
    position:relative;overflow:hidden;cursor:zoom-in;
  }
  .photo-grid-main img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
  .photo-grid-main:hover img{transform:scale(1.03);}
  .photo-grid-side{position:relative;overflow:hidden;cursor:zoom-in;}
  .photo-grid-side img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
  .photo-grid-side:hover img{transform:scale(1.05);}
  .photo-grid-placeholder{
    grid-row:span 2;grid-column:span 2;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--green-deep),var(--green-mid));
    font-size:80px;opacity:0.2;
  }
  .btn-all-photos{
    position:absolute;bottom:20px;right:20px;
    background:white;color:var(--text-dark);
    border:1.5px solid #ddd;border-radius:6px;
    padding:10px 18px;font-size:13px;font-weight:700;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:all 0.2s;z-index:5;
  }
  .btn-all-photos:hover{background:#f5f5f5;}

  /* CONTENT GRID */
  .content-grid{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:64px;
    padding-bottom:80px;
  }

  /* STÂNGA */
  .prop-left{}

  .prop-tagline{
    font-family:'Playfair Display',serif;
    font-size:22px;color:var(--green-deep);
    margin-bottom:20px;padding-bottom:20px;
    border-bottom:1px solid var(--green-mist);
  }

  .features-strip{
    display:flex;gap:32px;
    padding:24px 0;
    border-bottom:1px solid var(--green-mist);
    margin-bottom:28px;
  }
  .feat-item{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .feat-icon{font-size:26px;}
  .feat-val{font-size:17px;font-weight:700;color:var(--green-deep);}
  .feat-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#7a9a82;}

  .section-title{
    font-family:'Playfair Display',serif;
    font-size:20px;font-weight:700;color:var(--green-deep);
    margin-bottom:14px;
  }
  .prop-desc{
    font-size:16px;line-height:1.9;color:#3a5a48;font-weight:300;
    margin-bottom:32px;
  }
  .prop-desc-wrap{position:relative;margin-bottom:32px;}
  .prop-desc.is-collapsed{max-height:none;overflow:visible;}
  .prop-desc-toggle{
    display:none;
    margin-top:-14px;
    margin-bottom:32px;
    padding:0;
    border:none;
    background:none;
    color:var(--green-mid);
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    cursor:pointer;
  }

  /* details list */
  .details-list{
    display:grid;grid-template-columns:1fr 1fr;
    gap:0;margin-bottom:32px;
  }
  .detail-row{
    display:flex;justify-content:space-between;

  .detail-lbl{color:#7a9a82;font-weight:500;}
  .detail-val{color:var(--green-deep);font-weight:600;}

  .video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:8px;overflow:hidden;margin-bottom:32px;box-shadow:0 8px 32px rgba(26,58,42,0.1);}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}

  /* map */
  .map-wrap{border-radius:8px;overflow:hidden;height:300px;margin-bottom:32px;box-shadow:0 8px 32px rgba(26,58,42,0.1);}
  .map-wrap iframe{width:100%;height:100%;border:none;}

  /* DREAPTA - contact card sticky */
  .contact-card{
    position:sticky;top:90px;
    background:white;border-radius:12px;
    border:1px solid var(--green-pale);
    padding:28px;
    box-shadow:0 8px 40px rgba(26,58,42,0.1);

  .card-price{

    font-size:36px;font-weight:900;color:var(--green-deep);

  }
  .card-price-note{font-size:13px;color:#7a9a82;margin-bottom:24px;}
  .card-divider{height:1px;background:var(--green-mist);margin:20px 0;}
  .card-features{
    display:grid;grid-template-columns:1fr 1fr;
    gap:12px;margin-bottom:24px;
  }
  .card-feat{
    background:var(--off-white);border-radius:6px;
    padding:12px;text-align:center;
  }
  .card-feat-icon{font-size:20px;margin-bottom:4px;}
  .card-feat-val{font-size:15px;font-weight:700;color:var(--green-deep);}
  .card-feat-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7a9a82;}
  .contact-btns{display:flex;flex-direction:column;gap:10px;}
  .btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;background:#25d366;color:white;padding:15px;border-radius:8px;font-size:15px;font-weight:700;transition:background 0.2s;}
  .btn-wa:hover{background:#1ebe5d;}
  .btn-tel{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--green-deep);color:white;padding:15px;border-radius:8px;font-size:15px;font-weight:700;transition:background 0.2s;}
  .btn-tel:hover{background:var(--green-mid);}
  .btn-mail{display:flex;align-items:center;justify-content:center;gap:10px;border:1.5px solid var(--green-mid);color:var(--green-mid);padding:14px;border-radius:8px;font-size:15px;font-weight:700;transition:all 0.2s;}
  .btn-mail:hover{background:var(--green-mist);}
  .card-note{font-size:12px;color:#9ab8a0;text-align:center;margin-top:12px;}
  .card-secondary-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .btn-share,.btn-copy{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
  .btn-share{background:var(--off-white);color:var(--green-deep);}
  .btn-copy{border:1.5px solid var(--green-pale);background:white;color:var(--green-mid);}

  /* LOADING */
  .loading-page{min-height:60vh;display:flex;align-items:center;justify-content:center;font-size:16px;color:#7a9a82;}

  /* LIGHTBOX */
  /* FULLSCREEN VIEWER */
  .lightbox{position:fixed;inset:0;background:#081810;z-index:999;display:none;flex-direction:column;}
  .lightbox.open{display:flex;}
  .lb-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(0,0,0,0.5);position:absolute;top:0;left:0;right:0;z-index:2;}
  .lb-close{color:white;font-size:28px;cursor:pointer;background:none;border:none;line-height:1;padding:4px 8px;}
  .lb-counter{color:white;font-size:14px;font-weight:600;letter-spacing:1px;}
  .lb-track-wrap{flex:1;display:flex;align-items:center;overflow:hidden;position:relative;}

  .lb-slide{min-width:100vw;height:100%;display:flex;align-items:center;justify-content:center;padding:60px 0 40px;}

  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:2;}
  .lb-btn{pointer-events:all;background:rgba(255,255,255,0.15);border:none;color:white;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .lb-thumbs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:rgba(0,0,0,0.6);scrollbar-width:none;}
  .lb-thumbs::-webkit-scrollbar{display:none;}
  .lb-thumb{width:52px;height:52px;flex-shrink:0;border-radius:3px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;opacity:0.6;}
  .lb-thumb.active{border-color:white;opacity:1;}
  .lb-thumb img{width:100%;height:100%;object-fit:cover;}

  /* MOBILE SLIDER */
  .mobile-slider{display:none;}
  .mobile-contact-bar{display:none;}
  @media(max-width:768px){
	    nav{padding:7px 16px;}
    .nav-logo-img{width:102px;}

    .container{padding:0 16px;}
    .prop-header{padding:20px 0 14px;}
    .prop-title{font-size:26px;}
    .photo-grid{display:none;}
    .mobile-slider{display:block;position:relative;width:100%;height:72vw;max-height:460px;min-height:260px;overflow:hidden;background:#0d2318;border-radius:6px;margin-bottom:20px;}

    .mobile-slide{width:100%;min-width:100%;max-width:100%;height:100%;flex-shrink:0;flex-grow:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .mobile-slide-media{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .mobile-slide-bg{position:absolute;inset:0;background-position:center;background-repeat:no-repeat;background-size:cover;filter:blur(20px) saturate(0.92);transform:scale(1.08);opacity:0.56;}
    .mobile-slide-media::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(8,24,16,0.1), rgba(8,24,16,0.32));}
    .mobile-slide img{position:relative;z-index:1;width:100%;height:100%;object-fit:contain;display:block;}
    .mobile-slider-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
    .mobile-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:background 0.2s;}
    .mobile-dot.active{background:white;}
    .mobile-slider-counter{position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.45);color:white;font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;}
    .mobile-slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:white;width:38px;height:38px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .mobile-slider-btn.prev{left:10px;}
    .mobile-slider-btn.next{right:10px;}
    .content-grid{grid-template-columns:1fr;gap:32px;}
    .prop-left{order:2;}
    .prop-right{order:1;}
    .contact-card{position:static;}
    .features-strip{gap:16px;flex-wrap:wrap;}
    .details-list{grid-template-columns:1fr;}
    .detail-row:nth-child(even){padding-left:0;border-left:none;}
    .detail-row:nth-child(odd){padding-right:0;}
    .prop-desc-wrap{margin-bottom:24px;}
    .prop-desc.is-collapsed{
      max-height:170px;
      overflow:hidden;
      -webkit-mask-image:linear-gradient(to bottom, #000 68%, transparent 100%);
      mask-image:linear-gradient(to bottom, #000 68%, transparent 100%);
    }
    .prop-desc-toggle{display:inline-flex;align-items:center;}
    .mobile-contact-bar{
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;position:fixed;left:12px;right:12px;bottom:12px;z-index:110;
      background:rgba(250,255,248,0.94);padding:10px;border:1px solid var(--green-pale);border-radius:14px;
      box-shadow:0 14px 40px rgba(13,35,24,0.16);backdrop-filter:blur(10px);
    }
    .mobile-contact-bar a{
      display:flex;align-items:center;justify-content:center;
      min-height:48px;border-radius:10px;font-size:13px;font-weight:700;
    }
    .mobile-contact-bar .mobile-wa{background:#25d366;color:white;}
    .mobile-contact-bar .mobile-call{background:var(--green-deep);color:white;}
    body{padding-bottom:92px;}
  }
</style>

<script>
const SUPABASE_URL='https://onjwsqzkrhvknitohqyl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uandzcXprcmh2a25pdG9ocXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NzkwMjYsImV4cCI6MjA4NzE1NTAyNn0.fj_t4quODGN3MQds3TVcshi5cLpYssy77qgJ3KbwCdQ';

async function sbGet(table, params) {
  const url = new URL(SUPABASE_URL + '/rest/v1/' + table);
  if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }});
  if (!res.ok) throw new Error('Error ' + res.status);
  return await res.json();
}

async function sbPost(table, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
}

async function sbPatch(table, id, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
}

async function sbDelete(table, id) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!res.ok) throw new Error('Error ' + res.status);
}
let prop=null,curPhoto=0;

async function load(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(!id){showErr();return;}
  try {
    const arr = await sbGet('proprietati', {'id': 'eq.'+id, 'select': '*'});
    if(!arr || arr.length===0){showErr();return;}
    prop = arr[0];
    document.title='SAVINVEST – '+prop.title;
    render();
  } catch(e) {showErr();}
}

function showErr(){
  document.getElementById('loadingPage').innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:60px;opacity:0.3;margin-bottom:20px">🏔️</div><h2 style="font-family:Playfair Display,serif;color:#1a3a2a;margin-bottom:10px">Proprietatea nu a fost găsită</h2><p style="color:#7a9a82">Link incorect sau proprietatea a fost ștearsă.</p><a href="index.html" style="display:inline-block;margin-top:24px;padding:12px 28px;background:#1a3a2a;color:white;border-radius:4px;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase">← Înapoi</a></div>';
}

function render(){
  document.getElementById('loadingPage').style.display='none';
  document.getElementById('mainContent').style.display='block';

  const photos=prop.photos||[];
  const phone=prop.phone||'+40720123456';
  const waLink='https://wa.me/'+phone.replace(/[^0-9]/g,'')+'?text='+encodeURIComponent('Bună ziua! Sunt interesat de proprietatea: '+prop.title);
  updateMetaDetails();

  // HEADER
  document.getElementById('propHeader').innerHTML=`
    ${prop.badge?`<div class="prop-badge">${prop.badge}</div>`:''}
    <h1 class="prop-title">${prop.title}</h1>
    <div class="prop-meta">
      <span>📍 ${prop.location||''}</span>
      ${prop.type?`<span>· ${prop.type}</span>`:''}
    </div>
    <div class="prop-meta-feats">
      ${prop.rooms?`<div class="prop-meta-feat">🛏 ${prop.rooms} camere</div>`:''}
      ${prop.baths?`<div class="prop-meta-feat">🚿 ${prop.baths} băi</div>`:''}
      ${prop.area?`<div class="prop-meta-feat">🏗 ${prop.area} m² <span style="font-size:11px;color:#7a9a82">sup. construită</span></div>`:''}
      ${prop.area_useful?`<div class="prop-meta-feat">📋 ${prop.area_useful} m² <span style="font-size:11px;color:#7a9a82">sup. utilă</span></div>`:''}
      ${prop.land?`<div class="prop-meta-feat">🌳 ${prop.land} m² <span style="font-size:11px;color:#7a9a82">teren</span></div>`:''}
    </div>`;

  // PHOTO GRID
  const pg=document.getElementById('photoGrid');
  if(photos.length===0){
    pg.innerHTML='<div class="photo-grid-placeholder">🏡</div>';
  } else {
    const side1=photos[1]||photos[0];
    const side2=photos[2]||photos[0];
    const side3=photos[3]||photos[0];
    const side4=photos[4]||photos[0];
    pg.innerHTML=`
      <div class="photo-grid-main" onclick="openLb(0)">
        <img src="${photos[0]}" alt="${prop.title}" loading="eager" decoding="async" fetchpriority="high">
      </div>
      <div class="photo-grid-side" onclick="openLb(1)"><img src="${side1}" alt="" loading="lazy" decoding="async"></div>
      <div class="photo-grid-side" onclick="openLb(2)"><img src="${side2}" alt="" loading="lazy" decoding="async"></div>
      ${photos.length>1?`<button class="btn-all-photos" onclick="openLb(0)">⊞ Toate pozele (${photos.length})</button>`:''}`;
  }
  // Init mobile slider
  initMobileSlider(photos);

  // STÂNGA
  const videoHTML=prop.video?`
    <div class="section-title">Video</div>
    <div class="video-wrap"><iframe src="${embedUrl(prop.video)}" allowfullscreen></iframe></div>`:'';

  function getMapEmbed(val) {
    // Extrage coordonate din link Google Maps lung (@lat,lng)
    const coord = val.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (coord) return 'https://maps.google.com/maps?q=' + coord[1] + ',' + coord[2] + '&output=embed&z=16';
    // Adresa simpla
    return 'https://maps.google.com/maps?q=' + encodeURIComponent(val) + '&output=embed';
  }
  function getNavUrl(val) {
    const coord = val.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (coord) return 'https://www.google.com/maps/dir/?api=1&destination=' + coord[1] + ',' + coord[2];
    return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(val);
  }
  const mapHTML=prop.map?`
    <div class="section-title">Locație</div>
    <div class="map-wrap" style="position:relative">
      <iframe src="${getMapEmbed(prop.map)}" allowfullscreen loading="lazy" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <a href="${getNavUrl(prop.map)}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;padding:14px;background:#1a3a2a;color:white;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;transition:background 0.2s;" onmouseover="this.style.background='#2d6a4f'" onmouseout="this.style.background='#1a3a2a'">
      🗺️ Deschide în Google Maps
    </a>`:'';

  const details=[];
  if(prop.type) details.push(['Tip proprietate',prop.type]);
  if(prop.type === 'Teren' && prop.terrain_kind) details.push(['Categorie teren',prop.terrain_kind]);
  if(prop.location) details.push(['Locație',prop.location]);
  if(prop.area) details.push(['Suprafață construită',prop.area+' m²']);
  if(prop.area_useful) details.push(['Suprafață utilă',prop.area_useful+' m²']);
  if(prop.land) details.push(['Teren',prop.land+' m²']);
  if(prop.rooms) details.push(['Camere',prop.rooms]);
  if(prop.baths) details.push(['Băi',prop.baths]);
  if(prop.price) details.push(['Preț',prop.price+' €']);

  document.getElementById('propLeft').innerHTML=`
    ${details.length?`
      <div class="section-title">Detalii</div>
      <div class="details-list">
        ${details.map(([l,v])=>`<div class="detail-row"><span class="detail-lbl">${l}</span><span class="detail-val">${v}</span></div>`).join('')}
      </div>`:''}
    ${prop.desc?`<div class="section-title">Despre proprietate</div><div class="prop-desc-wrap"><p class="prop-desc is-collapsed" id="propDesc">${prop.desc.replace(/\n/g,'<br>')}</p><button class="prop-desc-toggle" id="propDescToggle" type="button" onclick="toggleDescription()">Vezi mai mult</button></div>`:''}
    ${videoHTML}
    ${mapHTML}`;

  // DREAPTA - card sticky
  document.getElementById('propRight').innerHTML=`
    <div class="contact-card">
      <div class="card-price">${prop.price?prop.price+' €':'Preț la cerere'}</div>
      <div class="card-price-note">Preț negociabil · ${
        prop.tva === 'inclus' ? 'TVA inclus' :
        prop.tva === 'plus' ? '+ TVA' :
        'Fără TVA'
      }${prop.vanzator === 'juridica' ? ' · Persoană juridică' : ' · Persoană fizică'}</div>
      <div class="card-divider"></div>
      ${prop.area||prop.rooms||prop.baths||prop.land?`
        <div class="card-features">
          ${prop.rooms?`<div class="card-feat"><div class="card-feat-icon">🛏</div><div class="card-feat-val">${prop.rooms}</div><div class="card-feat-lbl">Camere</div></div>`:''}
          ${prop.baths?`<div class="card-feat"><div class="card-feat-icon">🚿</div><div class="card-feat-val">${prop.baths}</div><div class="card-feat-lbl">Băi</div></div>`:''}
          ${prop.area?`<div class="card-feat"><div class="card-feat-icon">🏗</div><div class="card-feat-val">${prop.area} m²</div><div class="card-feat-lbl">Sup. Construită</div></div>`:''}
          ${prop.area_useful?`<div class="card-feat"><div class="card-feat-icon">📋</div><div class="card-feat-val">${prop.area_useful} m²</div><div class="card-feat-lbl">Sup. Utilă</div></div>`:''}
          ${prop.land?`<div class="card-feat"><div class="card-feat-icon">🌳</div><div class="card-feat-val">${prop.land} m²</div><div class="card-feat-lbl">Teren</div></div>`:''}
        </div>
        <div class="card-divider"></div>`:''}
      <div class="contact-btns">
        <a href="${waLink}" target="_blank" class="btn-wa">💬 Contactează pe WhatsApp</a>
        <a href="tel:${phone}" class="btn-tel">📞 ${phone}</a>
        <a href="mailto:office@savinvest.ro?subject=Interesat: ${encodeURIComponent(prop.title)}" class="btn-mail">✉️ Trimite Email</a>
      </div>
      <div class="card-secondary-actions">
        <button class="btn-share" type="button" onclick="shareProperty()">🔗 Distribuie</button>
        <button class="btn-copy" type="button" onclick="copyPropertyLink()">Copiază link</button>
      </div>
      <div class="card-note">Nu te vom contacta fără acordul tău</div>
    </div>`;

  document.getElementById('mobileContactBar').innerHTML = `
    <a href="${waLink}" target="_blank" class="mobile-wa">WhatsApp</a>
    <a href="tel:${phone}" class="mobile-call">Sună acum</a>
  `;

  setupDescriptionToggle();
}

function updateMetaDetails() {
  const title = prop && prop.title ? prop.title + ' | SAVINVEST' : 'SAVINVEST – Proprietate';
  const description = prop
    ? [prop.type, prop.location, prop.price ? prop.price + ' €' : 'Preț la cerere'].filter(Boolean).join(' · ')
    : 'Vezi detaliile proprietății.';
  document.title = title;
  setMetaTag('name', 'description', description);
  setMetaTag('property', 'og:title', title);
  setMetaTag('property', 'og:description', description);
  if (prop && prop.photos && prop.photos[0]) {
    setMetaTag('property', 'og:image', prop.photos[0]);
  }
  setCanonical(window.location.href);
  setStructuredData();
}

function setMetaTag(attr, name, content) {
  let tag = document.head.querySelector(`meta[${attr}="${name}"]`);
  if (!tag) {
    tag = document.createElement('meta');
    tag.setAttribute(attr, name);
    document.head.appendChild(tag);
  }
  tag.setAttribute('content', content);
}

function setCanonical(url) {
  let link = document.head.querySelector('link[rel="canonical"]');
  if (!link) {
    link = document.createElement('link');
    link.setAttribute('rel', 'canonical');
    document.head.appendChild(link);
  }
  link.setAttribute('href', url);
}

function setStructuredData() {
  const payload = {
    '@context': 'https://schema.org',
    '@type': 'Offer',
    name: prop.title,
    description: prop.desc || prop.title,
    priceCurrency: 'EUR',
    price: prop.price ? String(prop.price).replace(/[^\d.,]/g, '') : undefined,
    url: window.location.href,
    itemOffered: {
      '@type': 'SingleFamilyResidence',
      name: prop.title,
      address: prop.location
    }
  };
  let script = document.getElementById('propertyStructuredData');
  if (!script) {
    script = document.createElement('script');
    script.type = 'application/ld+json';
    script.id = 'propertyStructuredData';
    document.head.appendChild(script);
  }
  script.textContent = JSON.stringify(payload);
}

async function shareProperty() {
  if (navigator.share) {
    try {
      await navigator.share({
        title: prop ? prop.title : 'Proprietate SAVINVEST',
        text: prop ? `Vezi detaliile pentru ${prop.title}` : 'Vezi această proprietate SAVINVEST',
        url: window.location.href
      });
      return;
    } catch (_) {}
  }
  copyPropertyLink();
}

async function copyPropertyLink() {
  try {
    await navigator.clipboard.writeText(window.location.href);
    alert('Linkul proprietății a fost copiat.');
  } catch (_) {
    alert('Nu am putut copia linkul automat. Copiază-l manual din bara de adresă.');
  }
}

function setupDescriptionToggle() {
  const desc = document.getElementById('propDesc');
  const toggle = document.getElementById('propDescToggle');
  if (!desc || !toggle) return;

  requestAnimationFrame(function() {
    const isMobile = window.innerWidth <= 768;
    const shouldCollapse = isMobile && desc.scrollHeight > 190;
    desc.classList.toggle('is-collapsed', shouldCollapse);
    toggle.style.display = shouldCollapse ? 'inline-flex' : 'none';
    toggle.textContent = 'Vezi mai mult';
    toggle.setAttribute('aria-expanded', 'false');
  });
}

function toggleDescription() {
  const desc = document.getElementById('propDesc');
  const toggle = document.getElementById('propDescToggle');
  if (!desc || !toggle) return;

  const collapsed = desc.classList.contains('is-collapsed');
  desc.classList.toggle('is-collapsed', !collapsed);
  toggle.textContent = collapsed ? 'Vezi mai puțin' : 'Vezi mai mult';
  toggle.setAttribute('aria-expanded', collapsed ? 'true' : 'false');
}

// LIGHTBOX
function openLb(i){
  curPhoto = i;
  const photos = prop.photos;
  // Build track
  const track = document.getElementById('lbTrack');
  track.innerHTML = photos.map((url, idx) =>
    `<div class="lb-slide"><div class="lb-slide-media"><div class="lb-slide-bg" style="background-image:url('${url}')"></div><img src="${url}" alt="" loading="${idx === i ? 'eager' : 'lazy'}" decoding="async"></div></div>`
  ).join('');
  // Build thumbs
  const thumbs = document.getElementById('lbThumbs');
  thumbs.innerHTML = photos.map((url, idx) =>
    `<div class="lb-thumb ${idx===i?'active':''}" onclick="lbGoTo(${idx})"><img src="${url}" alt="" loading="lazy" decoding="async"></div>`
  ).join('');
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  // Swipe in lightbox
  let lbStartX=0, lbDragging=false;
  track.addEventListener('touchstart', e=>{lbStartX=e.touches[0].clientX;lbDragging=false;},{passive:true});
  track.addEventListener('touchmove', e=>{if(Math.abs(e.touches[0].clientX-lbStartX)>10)lbDragging=true;},{passive:true});
  track.addEventListener('touchend', e=>{
    if(!lbDragging)return;
    const diff=lbStartX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>30)lbNav(diff>0?1:-1);
  },{passive:true});
}
function updateLb(){
  const n=prop.photos.length;
  document.getElementById('lbTrack').style.transform=`translateX(-${curPhoto*100}vw)`;
  document.getElementById('lbCounter').textContent=(curPhoto+1)+' / '+n;
  document.querySelectorAll('.lb-thumb').forEach((t,i)=>t.classList.toggle('active',i===curPhoto));
  // Scroll active thumb into view
  const activeThumb = document.querySelectorAll('.lb-thumb')[curPhoto];
  if(activeThumb) activeThumb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function closeLb(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function lbNav(dir){
  const n=prop.photos.length;
  curPhoto=(curPhoto+dir+n)%n;
  updateLb();
}
function lbGoTo(i){curPhoto=i;updateLb();}
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLb();});

// MOBILE SLIDER
let sliderIndex = 0;
let sliderPhotos = [];

function initMobileSlider(photos) {
  if (!photos || photos.length === 0) return;
  if (window.innerWidth > 768) return;
  sliderPhotos = photos;
  const track = document.getElementById('sliderTrack');
  const dots = document.getElementById('sliderDots');
  
  track.innerHTML = photos.map((url, i) => 
    `<div class="mobile-slide" onclick="openLb(${i})" style="cursor:zoom-in;"><div class="mobile-slide-media"><div class="mobile-slide-bg" style="background-image:url('${url}')"></div><img src="${url}" alt="" loading="${i === 0 ? 'eager' : 'lazy'}" decoding="async"></div></div>`
  ).join('');
  
  dots.innerHTML = photos.map((_, i) => 
    `<div class="mobile-dot ${i===0?'active':''}" onclick="sliderGoTo(${i})"></div>`
  ).join('');
  
  updateSlider();
  
  // Swipe support
  let startX = 0;
  let startY = 0;
  let isDragging = false;
  const slider = document.getElementById('mobileSlider');
  
  slider.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, {passive:true});
  
  slider.addEventListener('touchmove', e => {
    const diffX = Math.abs(e.touches[0].clientX - startX);
    const diffY = Math.abs(e.touches[0].clientY - startY);
    if (diffX > diffY && diffX > 10) isDragging = true;
  }, {passive:true});
  
  slider.addEventListener('touchend', e => {
    if (!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 30) sliderNav(diff > 0 ? 1 : -1);
  }, {passive:true});
  
  document.getElementById('mobileSlider').style.display = 'block';
  // Fix widths after render
  setTimeout(() => {
    const sliderWidth = document.getElementById('mobileSlider').offsetWidth;
    document.querySelectorAll('.mobile-slide').forEach(s => {
      s.style.minWidth = sliderWidth + 'px';
      s.style.width = sliderWidth + 'px';
    });
    updateSlider();
  }, 50);
}

function sliderNav(dir) {
  sliderIndex = (sliderIndex + dir + sliderPhotos.length) % sliderPhotos.length;
  updateSlider();
}

function sliderGoTo(i) {
  sliderIndex = i;
  updateSlider();
}

function updateSlider() {
  const track = document.getElementById('sliderTrack');
  const sliderWidth = document.getElementById('mobileSlider').offsetWidth;
  track.style.transform = `translateX(-${sliderIndex * sliderWidth}px)`;
  document.getElementById('sliderCounter').textContent = `${sliderIndex+1} / ${sliderPhotos.length}`;
  document.querySelectorAll('.mobile-dot').forEach((d,i) => d.classList.toggle('active', i===sliderIndex));
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='Escape')closeLb();
});

function embedUrl(url){
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if(yt)return'https://www.youtube.com/embed/'+yt[1];
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return'https://player.vimeo.com/video/'+vm[1];
  return url;
}

load();
</script>
