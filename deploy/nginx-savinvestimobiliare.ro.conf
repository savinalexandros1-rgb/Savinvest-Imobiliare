server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.savinvestimobiliare.ro;

    ssl_certificate /etc/letsencrypt/live/savinvestimobiliare.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/savinvestimobiliare.ro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://savinvestimobiliare.ro$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name savinvestimobiliare.ro;

    root /var/www/savinvestimobiliare.ro;
    index index.html;

    access_log /var/log/nginx/savinvestimobiliare.access.log;
    error_log /var/log/nginx/savinvestimobiliare.error.log;

    ssl_certificate /etc/letsencrypt/live/savinvestimobiliare.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/savinvestimobiliare.ro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* ^/(favicon.*|apple-touch.*|android-chrome.*|savinvest-tree.*|site\.webmanifest|manifest\.json|browserconfig\.xml)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name savinvestimobiliare.ro www.savinvestimobiliare.ro;
    return 301 https://savinvestimobiliare.ro$request_uri;
}
